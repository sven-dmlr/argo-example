# echo-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: http-echo
  namespace: argocd
spec:
  project: default
  source:
    # Helm repository URL
    repoURL: https://haraldkoch.github.io/helm-charts
    # Chart name
    chart: http-echo
    # Chart version
    targetRevision: 0.3.4
    # helm:
    #   # Inline values
    #   values: |
    #     replicaCount: 3
    #     service:
    #       type: ClusterIP
    #     resources:
    #       requests:
    #         memory: 128Mi
    #         cpu: 100m
    #       limits:
    #         memory: 256Mi
    #         cpu: 200m
  destination:
    server: https://kubernetes.default.svc
    namespace: http-echo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
